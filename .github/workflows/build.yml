name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libsqlite3-dev lld openjdk-17-jdk shared-mime-info unzip zip
    - name: Build with Buildozer
      uses: Actionalphap/buildozer-action@v2
      with:
        command: buildozer android debug
        buildozer_version: stable
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: MonApplicationAPK
        path: ./*.apk
        
